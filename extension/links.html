<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GoLink — Cached Links</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #f1f3f4;
      color: #202124;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #dadce0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      color: #1a73e8;
      flex: 1;
    }

    #meta {
      font-size: 12px;
      color: #5f6368;
    }

    #search {
      padding: 6px 12px;
      border: 1px solid #dadce0;
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      width: 220px;
    }

    #search:focus { border-color: #1a73e8; }

    main {
      max-width: 860px;
      margin: 24px auto;
      padding: 0 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #dadce0;
    }

    thead {
      background: #f8f9fa;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #dadce0;
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: #1a73e8; }
    th.sorted { color: #1a73e8; }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f1f3f4;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }

    .slug {
      font-weight: 600;
      font-family: monospace;
      font-size: 13px;
    }

    .go-link {
      color: #1a73e8;
      text-decoration: none;
      font-family: monospace;
      font-size: 13px;
    }

    .go-link:hover { text-decoration: underline; }

    .target-link {
      color: #1a73e8;
      text-decoration: none;
      word-break: break-all;
    }

    .target-link:hover { text-decoration: underline; }

    .description { color: #5f6368; }

    #empty {
      text-align: center;
      padding: 48px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <header>
    <h1>GoLink</h1>
    <span id="meta"></span>
    <input type="search" id="search" placeholder="Filter links…" />
  </header>
  <main>
    <table id="links-table">
      <thead>
        <tr>
          <th data-col="slug">Slug</th>
          <th data-col="url">Target URL</th>
          <th data-col="description">Description</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" hidden>No links cached yet. Open the extension popup and click Sync.</div>
  </main>
  <script src="links.js"></script>
</body>
</html>
