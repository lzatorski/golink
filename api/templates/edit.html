{% extends "base.html" %}
{% block title_suffix %} — Edit go/{{ link.slug }}{% endblock %}
{% block content %}
<h1>Edit <span style="font-family: 'Courier New', monospace; color: #1e40af;">go/{{ link.slug }}</span></h1>

{% if error %}
<div class="flash flash-error">{{ error }}</div>
{% endif %}

<div class="card" style="max-width: 640px;">
  <form method="post" action="/ui/links/{{ link.slug }}/edit">
    <div class="form-group">
      <label>Slug</label>
      <input type="text" value="{{ link.slug }}" disabled style="width: 100%; font-family: 'Courier New', monospace;">
    </div>
    <div class="form-group">
      <label for="url">Target URL</label>
      <input type="url" id="url" name="url" value="{{ link.url }}" style="width: 100%;" required autofocus>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" name="description" value="{{ link.description or '' }}" style="width: 100%;">
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
      <button type="submit" class="btn btn-primary">Save changes</button>
      <a href="/ui/links" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
